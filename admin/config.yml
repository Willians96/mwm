backend:
  name: github
  repo: Willians96/mwm
  branch: main
  base_url: https://mwm-topaz.vercel.app
  auth_endpoint: api/auth
display_url: https://mwm-topaz.vercel.app

media_folder: "img"
public_folder: "../img"

collections:
  - name: "loja"
    label: "Configurações da Loja"
    files:
      - label: "Produtos Afiliados"
        name: "produtos"
        file: "data/produtos.json"
        description: "Lista de todos os produtos recomendados na aba Loja"
        fields:
          - label: "Lista de Produtos"
            name: "itens"
            widget: "list"
            fields:
              - {label: "Nome do Produto", name: "nome", widget: "string"}
              - {label: "Preço", name: "preco", widget: "string", required: false, hint: "Apenas se quiser fixar um preço diferente do Automático. Deixe em branco para ML/Shopee."}
              - {label: "Imagem", name: "imagem", widget: "string", required: false, hint: "Apenas se a foto automática não carregar ou quiser uma diferente."}
              - {label: "Seu Link de Afiliado", name: "link", widget: "string"}
              - {label: "Plataforma", name: "plataforma", widget: "select", options: ["Mercado Livre", "Shopee", "Amazon", "Outro"]}
              - {label: "Categoria", name: "categoria", widget: "string"}
