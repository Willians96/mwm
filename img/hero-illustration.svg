<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="hero-grad1" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hero-grad2" x1="0%" y1="100%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="hero-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Monitor -->
  <g transform="translate(80, 60)">
    <rect x="0" y="20" width="200" height="120" rx="8" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.9"/>
    <rect x="8" y="28" width="184" height="96" rx="4" fill="url(#hero-grad1)" opacity="0.5"/>
    <line x1="20" y1="45" x2="120" y2="45" stroke="#22d3ee" stroke-width="0.8" opacity="0.6"/>
    <line x1="20" y1="58" x2="160" y2="58" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>
    <line x1="20" y1="71" x2="140" y2="71" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>
    <rect x="85" y="140" width="30" height="25" rx="2" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.7"/>
    <rect x="70" y="165" width="60" height="8" rx="2" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  <!-- Server / rack -->
  <g transform="translate(300, 100)">
    <rect x="0" y="0" width="120" height="160" rx="6" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.85"/>
    <rect x="12" y="12" width="96" height="20" rx="2" fill="url(#hero-grad2)" stroke="#22d3ee" stroke-width="0.8" opacity="0.6"/>
    <rect x="12" y="40" width="96" height="20" rx="2" fill="url(#hero-grad2)" stroke="#22d3ee" stroke-width="0.8" opacity="0.5"/>
    <rect x="12" y="68" width="96" height="20" rx="2" fill="url(#hero-grad2)" stroke="#22d3ee" stroke-width="0.8" opacity="0.5"/>
    <circle cx="24" cy="22" r="2" fill="#22d3ee" opacity="0.8"/>
    <circle cx="32" cy="22" r="2" fill="#22d3ee" opacity="0.5"/>
    <circle cx="40" cy="22" r="2" fill="#22d3ee" opacity="0.5"/>
  </g>
  <!-- Connection lines -->
  <path d="M280 140 Q320 120 300 160" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4 4" fill="none" opacity="0.4"/>
  <path d="M200 100 Q260 80 300 100" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4 4" fill="none" opacity="0.35"/>
  <!-- Nodes -->
  <circle cx="240" cy="180" r="40" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
  <circle cx="240" cy="180" r="24" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.5"/>
  <circle cx="240" cy="180" r="8" fill="#22d3ee" opacity="0.6" filter="url(#hero-glow)"/>
</svg>
